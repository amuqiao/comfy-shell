        sha256: fb5fb912696830da948e5056b50adfa3fcc68ff760c43e4e7a8499853af43c61
        size_bytes: 1445235365
        required: true
      - id: anime-vae-kl-f8-anime2
        directory: vae
        filename: kl-f8-anime2.ckpt
        source: manual
        note: PNG workflow 只包含文件名, 未确认可信下载源; 手动下载到 vae。
        required: true
      - id: ultrasharp-upscale
        directory: upscale_models
        filename: 4xUltrasharp_4xUltrasharpV10.pth
        source: manual
        note: PNG workflow 只包含文件名; 4x-UltraSharp.pth 可能是同类模型但未确认等价, 不自动重命名。
        required: true
      - id: easynegative-embedding
        directory: embeddings
        filename: EasyNegative.safetensors
        source: huggingface
        repo_type: dataset
        repo: gsdf/EasyNegative
        path: EasyNegative.safetensors
        sha256: c74b4e810b030f6b75fde959e2db678c268d07115b85356d3c0138ba5eb42340
        size_bytes: 24655
        required: true

