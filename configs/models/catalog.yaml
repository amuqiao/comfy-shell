version: 1

defaults:
  root_env: COMFY_MODEL_ROOT
  root: ./ComfyUI/models
  source: huggingface

bundles:
  retro-anime-photo-core:
    title: 批量照片转绘复古动漫风格
    tutorial: .data/nodes/批量照片转绘复古动漫风格（LoRA+ControlNet+UltimateSDUpscale）.png
    description: 从 PNG workflow 解析出的 SD1.5 复古动漫风格照片转绘模型清单。未知可信来源的条目标记为 manual。
    models:
      - id: isabelia-v10-checkpoint
        directory: checkpoints
        filename: isabelia_v10.safetensors
        source: manual
        note: PNG workflow 只包含文件名, 未确认可信下载源; 手动下载到 checkpoints。
        required: true
      - id: eighties-fusion-lora
        directory: loras
        filename: 80'sFusion.safetensors
        source: manual
        note: PNG workflow 只包含文件名, 未确认可信下载源; 手动下载到 loras。
        required: true
      - id: retro-anime-lora
        directory: loras
        filename: Retro_Anime-000002.safetensors
        source: manual
        note: PNG workflow 只包含文件名, 未确认可信下载源; 手动下载到 loras。
        required: true
      - id: sd15-controlnet-openpose
        directory: controlnet
        filename: control_v11p_sd15_openpose.pth
        source: huggingface
        repo: lllyasviel/ControlNet-v1-1
