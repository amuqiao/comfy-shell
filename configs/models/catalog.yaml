version: 1

defaults:
  root_env: COMFY_MODEL_ROOT
  root: ./ComfyUI/models
  source: huggingface

bundles:
  sdxl-basic:
    title: SDXL 文生图入门
    tutorial: docs/tutorials/01-text-to-image.md
    description: 用于第一篇文生图教程的基础 checkpoint。
    models:
      - id: sdxl-base-1.0
        directory: checkpoints
        filename: sd_xl_base_1.0.safetensors
        source: huggingface
        repo: stabilityai/stable-diffusion-xl-base-1.0
        path: sd_xl_base_1.0.safetensors
        required: true

  wan22-i2v-basic:
    title: Wan 2.2 图生视频入门
    tutorial: docs/tutorials/03-image-to-video.md
    blueprint: ComfyUI/blueprints/Image to Video (Wan 2.2).json
    description: ComfyUI 自带 Wan 2.2 I2V 蓝图依赖的基础模型文件。
    models:
      - id: wan22-i2v-high-noise
        directory: diffusion_models
        filename: wan2.2_i2v_high_noise_14B_fp8_scaled.safetensors
        source: huggingface
        repo: Comfy-Org/Wan_2.2_ComfyUI_Repackaged
        path: split_files/diffusion_models/wan2.2_i2v_high_noise_14B_fp8_scaled.safetensors
        required: true
      - id: wan22-i2v-low-noise
        directory: diffusion_models
        filename: wan2.2_i2v_low_noise_14B_fp8_scaled.safetensors
        source: huggingface
        repo: Comfy-Org/Wan_2.2_ComfyUI_Repackaged
        path: split_files/diffusion_models/wan2.2_i2v_low_noise_14B_fp8_scaled.safetensors
        required: true
      - id: wan22-i2v-lora-high-noise
        directory: loras
        filename: wan2.2_i2v_lightx2v_4steps_lora_v1_high_noise.safetensors
        source: huggingface
        repo: Comfy-Org/Wan_2.2_ComfyUI_Repackaged
        path: split_files/loras/wan2.2_i2v_lightx2v_4steps_lora_v1_high_noise.safetensors
        required: true
      - id: wan22-i2v-lora-low-noise
        directory: loras
        filename: wan2.2_i2v_lightx2v_4steps_lora_v1_low_noise.safetensors
        source: huggingface
        repo: Comfy-Org/Wan_2.2_ComfyUI_Repackaged
        path: split_files/loras/wan2.2_i2v_lightx2v_4steps_lora_v1_low_noise.safetensors
        required: true
      - id: wan21-vae
        directory: vae
        filename: wan_2.1_vae.safetensors
        source: huggingface
        repo: Comfy-Org/Wan_2.2_ComfyUI_Repackaged
        path: split_files/vae/wan_2.1_vae.safetensors
        required: true
      - id: umt5-xxl-fp8
        directory: text_encoders
        filename: umt5_xxl_fp8_e4m3fn_scaled.safetensors
        source: huggingface
        repo: Comfy-Org/Wan_2.1_ComfyUI_repackaged
        path: split_files/text_encoders/umt5_xxl_fp8_e4m3fn_scaled.safetensors
        required: true

  wan22-t2v-basic:
    title: Wan 2.2 文生视频入门
    tutorial: docs/tutorials/04-text-to-video.md
    blueprint: ComfyUI/blueprints/Text to Video (Wan 2.2).json
    description: ComfyUI 自带 Wan 2.2 T2V 蓝图依赖的基础模型文件。
    models:
      - id: wan22-t2v-high-noise
        directory: diffusion_models
        filename: wan2.2_t2v_high_noise_14B_fp8_scaled.safetensors
        source: huggingface
        repo: Comfy-Org/Wan_2.2_ComfyUI_Repackaged
        path: split_files/diffusion_models/wan2.2_t2v_high_noise_14B_fp8_scaled.safetensors
        required: true
      - id: wan22-t2v-low-noise
        directory: diffusion_models
        filename: wan2.2_t2v_low_noise_14B_fp8_scaled.safetensors
        source: huggingface
        repo: Comfy-Org/Wan_2.2_ComfyUI_Repackaged
        path: split_files/diffusion_models/wan2.2_t2v_low_noise_14B_fp8_scaled.safetensors
        required: true
      - id: wan22-t2v-lora-high-noise
        directory: loras
        filename: wan2.2_t2v_lightx2v_4steps_lora_v1.1_high_noise.safetensors
        source: huggingface
        repo: Comfy-Org/Wan_2.2_ComfyUI_Repackaged
        path: split_files/loras/wan2.2_t2v_lightx2v_4steps_lora_v1.1_high_noise.safetensors
        required: true
      - id: wan22-t2v-lora-low-noise
        directory: loras
        filename: wan2.2_t2v_lightx2v_4steps_lora_v1.1_low_noise.safetensors
        source: huggingface
        repo: Comfy-Org/Wan_2.2_ComfyUI_Repackaged
        path: split_files/loras/wan2.2_t2v_lightx2v_4steps_lora_v1.1_low_noise.safetensors
        required: true
      - id: wan21-vae
        directory: vae
        filename: wan_2.1_vae.safetensors
        source: huggingface
        repo: Comfy-Org/Wan_2.2_ComfyUI_Repackaged
        path: split_files/vae/wan_2.1_vae.safetensors
        required: true
      - id: umt5-xxl-fp8
        directory: text_encoders
        filename: umt5_xxl_fp8_e4m3fn_scaled.safetensors
        source: huggingface
        repo: Comfy-Org/Wan_2.1_ComfyUI_repackaged
        path: split_files/text_encoders/umt5_xxl_fp8_e4m3fn_scaled.safetensors
        required: true

